  <style id="self-contained-dashboard-styles">
/* style.css */
:root {
  --aup-blue: #0B3B75;
  --aup-navy: #071C3D;
  --aup-gold: #F4B400;
  --aup-gold-dark: #C99700;
  --aup-light-bg: #F8FAFC;
  --aup-border: #E5E7EB;
  --aup-text: #1F2937;
  --aup-muted: #6B7280;
  --danger: #B91C1C;
  --success: #047857;
  --card: #FFFFFF;
  --shadow: 0 18px 42px rgba(0, 33, 71, 0.16);
}

* {
  box-sizing: border-box;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

*::-webkit-scrollbar {
  display: none;
  height: 0;
  width: 0;
}

html,
body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  background: var(--aup-light-bg);
  color: var(--aup-text);
  font-family: Arial, Helvetica, sans-serif;
  letter-spacing: 0;
}

body.auth-active {
  overflow-x: hidden;
  overflow-y: auto;
}

[hidden] {
  display: none !important;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  grid-template-rows: 72px minmax(0, 1fr);
  height: 100vh;
  width: 100%;
}

.auth-screen {
  align-items: center;
  background:
    linear-gradient(180deg, rgba(7, 28, 61, 0.84), rgba(7, 28, 61, 0.94)),
    url("https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1600&q=80");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  height: auto;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  padding: 34px 18px;
  position: relative;
  animation: authBackgroundCycle 24s infinite;
}

.auth-screen::before {
  height: min(70vw, 520px);
  right: -110px;
  top: 8vh;
  width: min(70vw, 520px);
}

.auth-brand {
  align-items: center;
  color: #fff;
  display: flex;
  gap: 14px;
  margin-bottom: 28px;
  max-width: 960px;
  min-width: 0;
  position: relative;
  width: 100%;
  z-index: 1;
}

.auth-brand h1 {
  font-size: 26px;
  margin: 0;
}

.auth-brand p {
  color: rgba(255, 255, 255, 0.78);
  margin: 4px 0 0;
}

.auth-layout {
  display: grid;
  gap: 20px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  max-width: 960px;
  min-width: 0;
  position: relative;
  width: 100%;
  z-index: 1;
}

.auth-card {
  background: #fff;
  border: 1px solid rgba(229, 231, 235, 0.82);
  border-top: 6px solid var(--aup-gold);
  border-radius: 10px;
  box-shadow: var(--shadow);
  max-height: calc(100svh - 150px);
  max-width: 100%;
  min-width: 0;
  overflow-y: auto;
  padding: 26px;
}

.auth-card h2 {
  color: var(--aup-navy);
  font-size: 25px;
  margin: 0;
}

.auth-card p {
  color: var(--aup-muted);
  line-height: 1.45;
  margin: 8px 0 18px;
}

.auth-form {
  display: grid;
  gap: 14px;
}

.auth-tabs {
  background: rgba(15, 23, 42, 0.06);
  border: 1px solid rgba(15, 23, 42, 0.1);
  border-radius: 10px;
  display: grid;
  gap: 4px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  margin: 18px 0;
  padding: 4px;
}

.auth-tab-button {
  background: transparent;
  border: 0;
  border-radius: 8px;
  color: var(--aup-muted);
  cursor: pointer;
  font-weight: 900;
  min-height: 40px;
  min-width: 0;
  overflow-wrap: anywhere;
  padding: 8px 10px;
}

.auth-tab-button.active {
  background: #fff;
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
  color: var(--aup-navy);
}

.auth-tab-panel {
  max-height: min(58vh, 520px);
  min-width: 0;
  overflow-x: hidden;
  overflow-y: auto;
  padding-right: 4px;
  scrollbar-gutter: stable;
}

.signup-form {
  padding-bottom: 4px;
  padding-top: 0;
}

.auth-link-button {
  justify-self: start;
  min-height: 44px;
  padding: 0;
}

.auth-form label {
  color: var(--aup-navy);
  display: flex;
  flex-direction: column;
  font-size: 13px;
  font-weight: 800;
  gap: 7px;
}

.auth-form input,
.auth-form select {
  border: 1px solid var(--aup-border);
  border-radius: 8px;
  min-height: 46px;
  min-width: 0;
  outline: 0;
  padding: 10px 12px;
  width: 100%;
}

.auth-form input:focus,
.auth-form select:focus {
  border-color: var(--aup-gold);
  box-shadow: 0 0 0 3px rgba(244, 180, 0, 0.18);
}

.auth-footnote {
  color: rgba(255, 255, 255, 0.74);
  line-height: 1.45;
  margin: 18px 0 0;
  max-width: 960px;
  text-align: center;
}

.topbar {
  align-items: center;
  background: var(--card);
  border-bottom: 1px solid var(--aup-border);
  display: flex;
  gap: 20px;
  grid-column: 1 / -1;
  min-width: 0;
  padding: 10px 18px;
  z-index: 20;
}

.brand-area {
  align-items: center;
  display: flex;
  gap: 12px;
  min-width: 248px;
}

.brand-logo {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 10px 24px rgba(7, 28, 61, 0.18);
  flex: 0 0 auto;
  height: 50px;
  object-fit: contain;
  object-position: center;
  padding: 3px;
  width: 50px;
}

.brand-area h1 {
  color: var(--aup-navy);
  font-size: 18px;
  line-height: 1.1;
  margin: 0;
}

.brand-area p {
  color: var(--aup-muted);
  font-size: 12px;
  margin: 3px 0 0;
}

.calendar-nav {
  align-items: center;
  display: flex;
  flex: 1;
  gap: 8px;
  min-width: 0;
}

.period-controls {
  align-items: center;
  display: inline-flex;
  flex: 0 0 auto;
  gap: 8px;
}

.toolbar-actions {
  align-items: center;
  display: flex;
  gap: 10px;
  min-width: 0;
}

.toolbar-button,
.secondary-button,
.primary-button,
.danger-button,
.text-button,
.create-button,
.view-selector {
  border-radius: 999px;
  min-height: 44px;
  padding: 0 16px;
}

.toolbar-button,
.secondary-button,
.view-selector {
  background: #fff;
  border: 1px solid var(--aup-border);
  color: var(--aup-navy);
}

.toolbar-button:hover,
.secondary-button:hover,
.view-selector:hover,
.icon-button:hover {
  border-color: var(--aup-gold);
  color: var(--aup-blue);
}

.primary-button,
.create-button {
  background: var(--aup-blue);
  border: 1px solid var(--aup-blue);
  color: #fff;
  font-weight: 700;
}

.primary-button:hover,
.create-button:hover {
  background: var(--aup-navy);
  border-color: var(--aup-gold);
  box-shadow: 0 0 0 3px rgba(244, 180, 0, 0.18);
}

.danger-button {
  background: #fff;
  border: 1px solid rgba(185, 28, 28, 0.35);
  color: var(--danger);
  font-weight: 700;
}

.danger-button:hover {
  background: #FEF2F2;
}

.text-button {
  background: transparent;
  border: 0;
  color: var(--aup-muted);
  text-align: left;
}

.icon-button {
  align-items: center;
  background: #fff;
  border: 1px solid transparent;
  border-radius: 50%;
  color: var(--aup-navy);
  display: inline-flex;
  font-size: 22px;
  height: 44px;
  justify-content: center;
  min-width: 44px;
  padding: 0;
}

.icon-button span {
  background: currentColor;
  border-radius: 999px;
  display: block;
  height: 2px;
  width: 18px;
}

.icon-button span + span {
  margin-top: 4px;
}

.mobile-only,
.mobile-search-button {
  display: none;
}

.search-wrap {
  align-items: center;
  display: flex;
  min-width: 210px;
}

.search-wrap input {
  background: var(--aup-light-bg);
  border: 1px solid transparent;
  border-radius: 999px;
  height: 44px;
  outline: 0;
  padding: 0 16px;
  width: 100%;
}

.search-wrap input:focus {
  background: #fff;
  border-color: var(--aup-gold);
  box-shadow: 0 0 0 3px rgba(244, 180, 0, 0.18);
}

.view-selector {
  appearance: none;
  background-image: linear-gradient(45deg, transparent 50%, var(--aup-blue) 50%), linear-gradient(135deg, var(--aup-blue) 50%, transparent 50%);
  background-position: calc(100% - 16px) 19px, calc(100% - 11px) 19px;
  background-repeat: no-repeat;
  background-size: 5px 5px;
  min-width: 124px;
  padding-right: 34px;
}

.profile-pill {
  align-items: center;
  background: #fff;
  border: 1px solid var(--aup-border);
  border-radius: 999px;
  color: var(--aup-navy);
  display: flex;
  height: 44px;
  max-width: 190px;
  min-width: 0;
  padding: 0 14px;
}

.profile-pill span {
  display: none;
}

.profile-pill strong {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sidebar {
  background: var(--card);
  border-right: 1px solid var(--aup-border);
  grid-column: 1;
  grid-row: 2;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 18px;
}

.create-button {
  box-shadow: 0 6px 16px rgba(0, 58, 112, 0.18);
  font-size: 17px;
  height: 52px;
  margin-bottom: 18px;
  width: 100%;
}

.sidebar-section {
  border-bottom: 1px solid var(--aup-border);
  padding: 16px 0;
}

.sidebar-section:first-of-type {
  padding-top: 0;
}

.sidebar-tabs {
  display: grid;
  gap: 8px;
  grid-template-columns: 1fr;
}

.sidebar-tab {
  line-height: 1.2;
  min-height: 42px;
  overflow-wrap: anywhere;
  white-space: normal;
}

.activity-item:last-child {
  border-bottom: 0;
}

.activity-item.unread-notification {
  background: #EFF6FF;
  border-left: 4px solid var(--aup-blue);
  padding-left: 12px;
}

.activity-item strong {
  color: var(--aup-navy);
}

.activity-item p {
  color: var(--aup-muted);
  margin: 4px 0 0;
}

.request-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 12px;
}

.toast-region {
  bottom: 24px;
  display: grid;
  gap: 10px;
  justify-items: end;
  pointer-events: none;
  position: fixed;
  right: 24px;
  z-index: 2147483647;
}

.toast {
  background: var(--aup-navy);
  border-left: 5px solid var(--aup-gold);
  border-radius: 8px;
  box-shadow: var(--shadow);
  color: #fff;
  max-width: 340px;
  pointer-events: auto;
  padding: 13px 16px;
}

.toast.error {
  border-left-color: var(--danger);
}

.toast.success {
  border-left-color: var(--success);
}

.mobile-scrim {
  display: none;
}

@keyframes authBackgroundCycle {
  0%,
  29% {
    background-image:
      linear-gradient(180deg, rgba(7, 28, 61, 0.84), rgba(7, 28, 61, 0.94)),
      url("https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1600&q=80");
  }
  33%,
  62% {
    background-image:
      linear-gradient(180deg, rgba(7, 28, 61, 0.84), rgba(7, 28, 61, 0.94)),
      url("https://images.unsplash.com/photo-1517502884422-41eaead166d4?auto=format&fit=crop&w=1600&q=80");
  }
  66%,
  100% {
    background-image:
      linear-gradient(180deg, rgba(7, 28, 61, 0.84), rgba(7, 28, 61, 0.94)),
      url("https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1600&q=80");
  }
}

@media (max-width: 1024px) {
  .app-shell {
    grid-template-columns: 236px minmax(0, 1fr);
  }

  .brand-area {
    min-width: 220px;
  }

  .search-wrap {
    min-width: 160px;
  }

  .profile-pill {
    display: none;
  }
}

@media (max-width: 768px) {
  html,
  body {
    overflow: hidden;
  }

  body.auth-active {
    overflow-x: hidden;
    overflow-y: auto;
  }

  .app-shell {
    height: 100vh;
    height: 100svh;
    height: 100dvh;
    grid-template-columns: 1fr;
    grid-template-rows: max-content minmax(0, 1fr);
    min-height: 100vh;
    min-height: 100svh;
    min-height: 100dvh;
    overflow: hidden;
  }

  .auth-layout {
    grid-template-columns: 1fr;
    max-width: min(100%, 560px);
  }

  .auth-screen {
    align-items: stretch;
    justify-content: flex-start;
    padding: 18px 12px;
  }

  .auth-brand {
    margin-bottom: 14px;
  }

  .auth-brand h1 {
    font-size: 22px;
  }

  .auth-brand p {
    font-size: 13px;
  }

  .auth-card {
    max-height: none;
    padding: 20px;
  }

  .auth-tab-panel {
    max-height: calc(100svh - 250px);
  }

  .topbar {
    align-items: center;
    display: grid;
    gap: 6px;
    grid-template-columns: 1fr auto;
    padding: 8px 10px 6px;
  }

  .mobile-only,
  .mobile-search-button {
    display: inline-flex;
  }

  #mobileMenuButton {
    border-color: var(--aup-border);
    color: var(--aup-blue);
    flex-direction: column;
    flex-shrink: 0;
  }

  .brand-area {
    min-width: 0;
  }

  .brand-logo {
    height: 40px;
    width: 40px;
  }

  .brand-area h1 {
    font-size: 16px;
  }

  .brand-area p,
  #todayButton,
  .print-button {
    display: none;
  }

  .calendar-nav {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr) auto;
    justify-content: stretch;
    order: 3;
  }

  .period-controls {
    gap: 8px;
  }

  .toolbar-actions {
    gap: 6px;
    justify-content: flex-end;
  }

  .toolbar-button,
  .view-selector {
    min-height: 44px;
    padding-left: 12px;
    padding-right: 12px;
  }

  .view-selector {
    display: block;
    max-width: 112px;
    min-width: 102px;
  }

  .search-wrap {
    min-width: 44px;
    order: 5;
  }

  .search-wrap input {
    display: none;
    position: absolute;
    right: 10px;
    top: 62px;
    width: calc(100vw - 20px);
    z-index: 35;
  }

  .search-wrap.open input {
    display: block;
  }

  .sidebar {
    bottom: 0;
    box-shadow: var(--shadow);
    left: 0;
    max-width: min(88vw, 330px);
    padding-top: 16px;
    position: fixed;
    top: 0;
    transform: translateX(-102%);
    transition: transform 180ms ease;
    width: 330px;
    z-index: 60;
  }

  .sidebar.open {
    transform: translateX(0);
  }

  .mobile-scrim {
    background: rgba(0, 33, 71, 0.36);
    bottom: 0;
    left: 0;
    position: fixed;
    right: 0;
    top: 0;
    z-index: 55;
  }

  .mobile-scrim.open {
    display: block;
  }

  .calendar-panel {
    grid-column: 1;
    grid-row: 2;
    min-height: 0;
  }

  .calendar-panel-header {
    min-height: 50px;
    padding: 11px 14px 9px;
  }

  .calendar-panel-header h2 {
    font-size: 19px;
  }

  #calendar,
  .fc,
  .fc .fc-view-harness,
  .fc .fc-view-harness-active {
    min-height: 0;
  }

  .fc .fc-toolbar-title {
    font-size: 18px;
  }

  .fc .fc-timegrid-slot-label,
  .fc .fc-col-header-cell-cushion {
    font-size: 13px;
  }

  .fc .fc-event {
    min-height: 28px;
  }

  .modal {
    border-radius: 16px 16px 0 0;
    bottom: 0;
    margin: auto 0 0;
    max-height: 92vh;
    max-width: 100vw;
    width: 100vw;
  }

  .modal-card,
  .wide-modal {
    border-radius: 16px 16px 0 0;
    max-height: 92vh;
    min-width: 100vw;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 18px;
  }

  .modal.tool-modal {
    border-radius: 0;
    height: 100vh;
    height: 100dvh;
    inset: 0;
    margin: 0 !important;
    max-height: 100vh;
    max-height: 100dvh;
    max-width: 100vw;
    min-height: 100vh;
    min-height: 100dvh;
    position: fixed;
    width: 100vw;
  }

  .modal.tool-modal .wide-modal {
    border-radius: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-height: 100vh;
    max-height: 100dvh;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    width: 100vw;
  }

  .modal.tool-modal .activity-list {
    flex: 1;
    min-height: 0;
    overflow: auto;
  }

  .modal.tool-modal .activity-item {
    padding: 9px 12px;
  }

  .modal.tool-modal .activity-item p {
    line-height: 1.25;
    margin-top: 2px;
  }

  .public-day-panel,
  .public-day-dialog {
    left: 50%;
    max-height: calc(100dvh - 24px);
    top: 50%;
    transform: translate(-50%, -50%) scale(0.96);
    width: calc(100vw - 20px);
  }

  .public-day-panel.open,
  .public-day-dialog.open {
    transform: translate(-50%, -50%) scale(1);
  }

  .admin-tabs-panel {
    padding-bottom: 12px;
  }

  .sidebar-tabs {
    grid-template-columns: repeat(auto-fit, minmax(116px, 1fr));
  }

  .sidebar-tab {
    font-size: clamp(12px, 3.4vw, 14px);
    min-height: 40px;
    padding-inline: 10px;
  }

  .form-grid {
    grid-template-columns: 1fr;
  }

  .schedule-grid,
  .shared-time-grid,
  .occurrence-row {
    grid-template-columns: 1fr;
  }

  #scheduleFields,
  #scheduleFields.is-multi-day,
  #blockTimeFields,
  #blockTimeFields.is-multi-day {
    grid-template-columns: 1fr;
  }

  .modal-header .icon-button,
  .public-day-header .icon-button {
    flex-basis: 40px;
    height: 40px;
    max-width: 40px;
    min-width: 40px;
    width: 40px;
  }

  .occurrence-exception-fields {
    grid-template-columns: 1fr;
  }

  .section-heading {
    align-items: stretch;
    flex-direction: column;
  }

  .time-field {
    grid-column: auto;
  }

  .full-span {
    grid-column: auto;
  }

  .modal-actions,
  .split-actions,
  .split-actions > div {
    align-items: stretch;
    flex-direction: column;
  }

  .details-list {
    grid-template-columns: 1fr;
  }

  .dashboard-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .account-card-head {
    grid-template-columns: 1fr;
  }

  .account-card-actions {
    justify-content: stretch;
  }
}

@media print {
  .danger-button,
  #detailsEditButton,
  .modal-actions,
  .sidebar,
  .topbar {
    display: none !important;
  }

  body,
  html {
    overflow: visible;
  }

  .calendar-panel,
  .app-shell {
    display: block;
    height: auto;
  }
}

@media (max-width: 480px) {
  .auth-screen {
    padding: 12px 10px;
  }

  .auth-brand {
    gap: 10px;
  }

  .auth-card {
    border-radius: 8px;
    padding: 16px;
  }

  .auth-card h2 {
    font-size: 21px;
  }

  .auth-tabs {
    margin: 14px 0;
  }

  .auth-tab-button {
    font-size: 13px;
    min-height: 38px;
    padding: 7px 8px;
  }

  .auth-tab-panel {
    max-height: calc(100svh - 220px);
  }

  .auth-form {
    gap: 12px;
  }

  .toolbar-actions {
    position: static;
    justify-content: space-between;
  }

  .calendar-nav {
    grid-template-columns: auto minmax(0, 1fr) auto;
    gap: 6px;
  }

  .brand-area h1 {
    max-width: 210px;
  }

  .toolbar-button {
    padding-left: 10px;
    padding-right: 10px;
  }

  .view-selector {
    max-width: 104px;
    min-width: 98px;
    padding-left: 10px;
    padding-right: 28px;
  }

  .fc .fc-timegrid-axis-cushion,
  .fc .fc-timegrid-slot-label-cushion {
    font-size: 12px;
  }

  .fc .fc-event-title,
  .fc .fc-event-time {
    font-size: 12px;
  }

  .toast-region {
    bottom: auto;
    justify-items: center;
    left: 50%;
    right: auto;
    top: 50%;
    transform: translate(-50%, -50%);
    width: min(360px, calc(100vw - 28px));
  }

  .toast {
    max-width: none;
    text-align: center;
    width: 100%;
  }
}

  border-bottom: 4px solid #1d4ed8 !important;
  box-shadow: 0 1px 0 rgba(15, 23, 42, 0.08);
  min-height: 5.5rem;
  padding: 0 18px;
}

.brand-area h1,
.calendar-nav h2,
.modal-header h3,
.auth-card h2,
.public-day-header h3,
.activity-item strong,
.public-day-event strong {
  color: #0f172a;
  font-family: 'Poppins', 'Inter', Arial, Helvetica, sans-serif;
  font-weight: 800;
}

.brand-area h1 {
  font-size: 22px;
  letter-spacing: 0.04em;
}

.brand-area p {
  max-width: 520px;
}

.brand-area p,
.calendar-nav h2,
.profile-pill,
.toolbar-button,
.secondary-button,
.view-selector,
.search-wrap input {
  color: #0f172a;
}

.brand-logo,
.profile-pill span {
  background: rgba(255, 255, 255, 0.94);
  border-radius: 999px;
  box-shadow: 0 10px 22px rgba(30, 64, 175, 0.18);
}

.brand-logo {
  height: 54px;
  width: 54px;
}

.sidebar {
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(249, 250, 251, 0.78));
  border-right: 1.5px solid rgba(229, 231, 235, 0.8);
  padding: 20px;
}

.sidebar-section {
  border-bottom-color: rgba(148, 163, 184, 0.26);
}

.calendar-panel {
  background: rgba(248, 250, 252, 0.36);
  padding: 16px;
}

#calendar {
  background: rgba(255, 255, 255, 0.7);
  border: 1.5px solid rgba(100, 116, 139, 0.24);
  border-radius: 18px;
  box-shadow: var(--shadow);
  overflow: hidden;
  backdrop-filter: blur(8px);
}

.fc .fc-scrollgrid,
.fc-theme-standard td,
.fc-theme-standard th {
  border-color: rgba(100, 116, 139, 0.22) !important;
}

.fc .fc-col-header-cell,
.fc .fc-daygrid-day-frame,
.fc .fc-timegrid-slot,
.fc .fc-timegrid-col-frame {
  background: rgba(255, 255, 255, 0.32);
}

.fc .fc-day-today {
  background: rgba(250, 204, 21, 0.18) !important;
}

.fc .fc-event {
  border-radius: 10px;
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
  font-family: 'Inter', Arial, Helvetica, sans-serif;
}

.fc .event-month-span {
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 68%, #facc15 170%) !important;
  border: 0 !important;
  box-shadow: 0 8px 16px rgba(37, 99, 235, 0.24);
  color: #ffffff !important;
  min-height: 26px;
}

.fc .event-month-span-single {
  border-radius: 999px !important;
  margin-left: 4px;
  margin-right: 4px;
}

.fc .event-month-span-multi {
  border-radius: 0 !important;
  margin-left: -2px !important;
  margin-right: -2px !important;
}

.fc .event-month-span-multi.fc-event-start,
.fc .event-month-span-multi.event-month-span:first-child {
  border-bottom-left-radius: 999px !important;
  border-top-left-radius: 999px !important;
  margin-left: 4px !important;
}

.fc .event-month-span-multi.fc-event-end,
.fc .event-month-span-multi.event-month-span:last-child {
  border-bottom-right-radius: 999px !important;
  border-top-right-radius: 999px !important;
  margin-right: 4px !important;
}

.fc .event-month-span-continuation .fc-event-title {
  display: none;
}

.fc .fc-event-title,
.fc .fc-event-time {
  font-weight: 800;
}

.toolbar-button,
.secondary-button,
.view-selector,
.profile-pill,
.search-wrap input,
.icon-button {
  background: rgba(255, 255, 255, 0.9);
  border: 1px solid rgba(100, 116, 139, 0.24);
  box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
}

.primary-button,
.create-button {
  background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
  border: 1px solid #2563eb;
  box-shadow: 0 8px 20px rgba(59, 130, 246, 0.28);
}

.primary-button:hover,
.create-button:hover {
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  border-color: #facc15;
  box-shadow: 0 0 0 4px rgba(250, 204, 21, 0.26);
}

.secondary-button:hover,
.toolbar-button:hover,
.view-selector:hover,
.icon-button:hover {
  border-color: #2563eb;
  color: #1d4ed8;
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
}

.create-button {
  border-radius: 14px;
  font-family: 'Poppins', 'Inter', Arial, Helvetica, sans-serif;
}

.availability-card,
.metric,
.activity-list,
.public-day-event,
.occurrence-row,
.shared-time-grid,
.multi-schedule {
  background: rgba(255, 255, 255, 0.68) !important;
  border-radius: 14px;
}

.metric strong {
  color: #2563eb;
  font-family: 'Poppins', 'Inter', Arial, Helvetica, sans-serif;
}

.activity-item {
  background: rgba(255, 255, 255, 0.44);
}

.activity-item:hover,
.public-day-event:hover,
.metric:hover,
.availability-card:hover {
  background: rgba(255, 255, 255, 0.82) !important;
  transform: translateY(-1px);
  transition: background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
}

.modal::backdrop {
  background: rgba(15, 23, 42, 0.64);
  backdrop-filter: blur(5px);
}

.modal,
.modal-card {
  border-radius: 18px;
}

.modal-card {
  background: rgba(255, 255, 255, 0.88);
  border: 1.5px solid rgba(229, 231, 235, 0.8);
}

.form-grid input,
.form-grid select,
.form-grid textarea,
.auth-form input,
.auth-form select,
.stack-label select {
  background: rgba(255, 255, 255, 0.92);
  border-color: rgba(100, 116, 139, 0.28);
  border-radius: 10px;
}

.form-grid input:focus,
.form-grid select:focus,
.form-grid textarea:focus,
.auth-form input:focus,
.auth-form select:focus,
.stack-label select:focus,
.search-wrap input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
}

.section-label {
  color: #334155;
  font-family: 'Poppins', 'Inter', Arial, Helvetica, sans-serif;
  letter-spacing: 0.06em;
}

.toast {
  background: #0f172a;
  border-left-color: #facc15;
  border-radius: 12px;
}

@media (max-width: 768px) {
  .topbar {
    min-height: auto;
    padding: 10px;
  }

  .brand-area p {
    max-width: 220px;
  }

  .calendar-panel {
    min-height: 0;
    padding: 10px;
  }

  #calendar {
    border-radius: 14px;
    min-height: 0;
  }

  .sidebar {
    background: rgba(255, 255, 255, 0.92);
  }
}


/* connect-calendar-overrides.css */
/* CONNECT calendar refinements: organization-colored events + AUP admin blocks */
.fc .event-month-span,
.fc .event-week-span-multi {
  border: 0 !important;
  color: #ffffff !important;
}

.fc .event-month-span,
.fc .event-week-span,
.fc .public-single-day-event {
  overflow: hidden !important;
}

.fc .event-month-span::before,
.fc .public-single-day-event::before {
  background: var(--event-accent-color, #facc15);
  content: "";
  height: 5px;
  left: 0;
  position: absolute;
  top: 0;
  width: 100%;
  z-index: 1;
}

.fc .event-month-span .fc-event-main,
.fc .public-single-day-event .fc-event-main {
  padding-top: 4px;
  position: relative;
  z-index: 2;
}

.fc .public-single-day-event,
.fc .public-multi-day-event {
  min-height: 0 !important;
}

.fc .public-single-day-event .fc-event-main,
.fc .public-multi-day-event .fc-event-main {
  min-width: 0;
  overflow: hidden;
}

.fc .public-single-day-event .fc-event-title,
.fc .public-single-day-event .fc-event-time,
.fc .public-multi-day-event .fc-event-title,
.fc .public-multi-day-event .fc-event-time {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fc .public-density-medium {
  border-radius: 6px !important;
  font-size: 11px !important;
  line-height: 1.05 !important;
  margin-bottom: 1px !important;
  padding: 1px 2px !important;
}

.fc .public-density-medium::before {
  height: 3px;
}

.fc .public-density-medium .fc-event-main {
  padding-top: 2px;
}

.fc .public-density-high {
  border-radius: 5px !important;
  font-size: 10px !important;
  line-height: 1 !important;
  margin-bottom: 0 !important;
  min-height: 14px !important;
  padding: 0 2px !important;
}

.fc .public-density-high::before {
  height: 2px;
}

.fc .public-density-high .fc-event-main {
  padding-top: 1px;
}

.fc .public-density-max {
  border-radius: 4px !important;
  font-size: 9px !important;
  line-height: 1 !important;
  margin-bottom: 0 !important;
  min-height: 12px !important;
  padding: 0 2px !important;
}

.fc .public-density-max::before {
  height: 0;
}

.fc .public-density-max .fc-event-main {
  padding-top: 0;
}

@media (max-width: 900px), (hover: none) and (pointer: coarse) {
  .public-shell .fc .fc-daygrid-day-events {
    min-height: 42px;
  }
}

.fc .event-month-span-single {
  border-radius: 999px !important;
  margin-left: 4px !important;
  margin-right: 4px !important;
}

.fc .event-month-span-multi {
  border-radius: 0 !important;
  box-shadow: none !important;
  margin-left: -3px !important;
  margin-right: -3px !important;
}

.fc .event-month-span-multi.fc-event-start {
  border-bottom-left-radius: 999px !important;
  border-top-left-radius: 999px !important;
  margin-left: 4px !important;
}

.fc .event-month-span-multi.fc-event-end {
  border-bottom-right-radius: 999px !important;
  border-top-right-radius: 999px !important;
  margin-right: 4px !important;
}

.fc .event-year-span {
  border-radius: 4px !important;
  font-size: 9px !important;
  line-height: 1 !important;
  margin-bottom: 1px !important;
  min-height: 10px !important;
  padding: 1px 2px !important;
}

.fc .event-year-span::before {
  display: none !important;
}

.fc .event-year-span .fc-event-main {
  padding-top: 0 !important;
}

.fc .event-year-span.event-month-span-multi {
  margin-left: -2px !important;
  margin-right: -2px !important;
}

.fc .event-year-span.event-month-span-multi.fc-event-start {
  border-bottom-left-radius: 4px !important;
  border-top-left-radius: 4px !important;
  margin-left: 2px !important;
}

.fc .event-year-span.event-month-span-multi.fc-event-end {
  border-bottom-right-radius: 4px !important;
  border-top-right-radius: 4px !important;
  margin-right: 2px !important;
}

.fc .event-week-span-multi {
  --week-line-lane-offset: 0px;
  --week-line-stem-width: 6px;
  background: transparent !important;
  background-color: transparent !important;
  background-image: none !important;
  border: 0 !important;
  border-color: transparent !important;
  border-left: 0 !important;
  border-radius: 0 !important;
  border-right: 0 !important;
  box-shadow: none !important;
  color: #ffffff !important;
  margin-left: -2px !important;
  margin-right: -2px !important;
  overflow: visible !important;
  padding: 0 !important;
}

.fc .event-week-span-multi.fc-event,
.fc .event-week-span-multi .fc-event-main-frame,
.fc .event-week-span-multi .fc-event-resizer {
  background: transparent !important;
  border: 0 !important;
  box-shadow: none !important;
}

.fc .fc-timegrid-col-events,
.fc .fc-timegrid-event-harness:has(.event-week-span-multi),
.fc .fc-timegrid-event-harness-inset:has(.event-week-span-multi) {
  overflow: visible !important;
}

.fc .fc-timegrid-event-harness:has(.event-week-span-multi) {
  left: 0 !important;
  max-width: none !important;
  right: 0 !important;
  width: auto !important;
}

.fc .event-week-span-multi::before {
  background: var(--event-fill-color, currentColor);
  border-radius: 999px;
  box-shadow: 0 2px 6px rgba(15, 23, 42, 0.16);
  content: "";
  height: 5px;
  left: calc(-22px + var(--week-line-lane-offset, 0px));
  position: absolute;
  right: calc(-22px - var(--week-line-lane-offset, 0px));
  top: 0;
  z-index: 4;
}

.fc .event-week-span-multi::after {
  background: var(--event-accent-color, currentColor);
  border-radius: 999px;
  bottom: 4px;
  box-shadow: 0 4px 10px rgba(15, 23, 42, 0.14);
  content: "";
  left: calc(12px + var(--week-line-lane-offset, 0px));
  position: absolute;
  top: 0;
  width: var(--week-line-stem-width, 6px);
  z-index: 6;
}

.fc .event-week-span-multi .fc-event-main {
  align-items: center;
  background: var(--event-fill-color, currentColor);
  border-radius: 999px;
  box-shadow: 0 6px 14px rgba(15, 23, 42, 0.16);
  display: inline-flex;
  height: auto !important;
  line-height: 1.1;
  margin: 6px 6px 0 calc(20px + var(--week-line-lane-offset, 0px));
  max-width: calc(100% - 28px);
  min-height: 0 !important;
  overflow: hidden;
  padding: 3px 9px;
  position: relative;
  white-space: nowrap;
  z-index: 7;
}

.fc .event-week-span-multi .fc-event-main-frame {
  min-width: 0;
  overflow: hidden;
}

.fc .event-week-span-multi .fc-event-time,
.fc .event-week-span-multi .fc-event-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.fc .event-week-span-start {
  margin-left: 0 !important;
}

.fc .event-week-span-start::before {
  left: calc(12px + var(--week-line-lane-offset, 0px));
}

.fc .event-week-span-end {
  margin-right: 0 !important;
}

.fc .event-week-span-start.event-week-span-end::before {
  left: calc(12px + var(--week-line-lane-offset, 0px));
}

.fc .event-week-density-medium::before {
  height: 4px;
}

.fc .event-week-density-medium .fc-event-main {
  font-size: 11px;
  margin-left: calc(18px + var(--week-line-lane-offset, 0px));
  padding: 2px 7px;
}

.fc .event-week-density-high::before {
  height: 3px;
}

.fc .event-week-density-high::after {
  bottom: 3px;
}

.fc .event-week-density-high .fc-event-main {
  font-size: 10px;
  margin-left: calc(16px + var(--week-line-lane-offset, 0px));
  padding: 2px 6px;
}

.fc .event-week-density-max::before {
  height: 2px;
}

.fc .event-week-density-max::after {
  bottom: 2px;
}

.fc .event-week-density-max .fc-event-main {
  font-size: 9px;
  margin-left: calc(14px + var(--week-line-lane-offset, 0px));
  padding: 1px 5px;
}

.fc .event-week-span-middle .fc-event-main-frame,
.fc .event-week-span-end .fc-event-main-frame,
.fc .event-month-span-continuation .fc-event-title {
  visibility: hidden !important;
}

.fc .event-week-span-middle .fc-event-main,
.fc .event-week-span-end:not(.event-week-span-start) .fc-event-main {
  background: transparent !important;
  box-shadow: none !important;
  height: 0 !important;
  margin: 0 !important;
  overflow: hidden !important;
  padding: 0 !important;
  width: 0 !important;
}

.fc .event-super-admin-block,
.fc .event-blocked {
  background: linear-gradient(135deg, #071c3d 0%, #0b3b75 72%, #f4b400 170%) !important;
  border: 1px solid #f4b400 !important;
  color: #ffffff !important;
  box-shadow: 0 8px 18px rgba(7, 28, 61, 0.24) !important;
}


/* connect-portal-pages.css */
/* CONNECT public, portal, and full-page login refinements */
.public-shell .topbar,
.portal-shell .topbar {
  background:
    linear-gradient(135deg, rgba(250, 204, 21, 0.98), rgba(234, 179, 8, 0.96) 46%, rgba(202, 138, 4, 0.95)),
    radial-gradient(circle at top right, rgba(255, 255, 255, 0.34), transparent 36%) !important;
  border-bottom: 5px solid #1d4ed8 !important;
  box-shadow: 0 14px 34px rgba(15, 23, 42, 0.16);
  min-height: 86px;
  position: relative;
}

.public-shell .calendar-nav {
  justify-content: flex-end;
}

.public-shell .app-shell,
.portal-shell .app-shell {
  background:
    radial-gradient(circle at 12% 18%, rgba(250, 204, 21, 0.24), transparent 30%),
    radial-gradient(circle at 88% 84%, rgba(37, 99, 235, 0.18), transparent 34%),
    linear-gradient(135deg, rgba(248, 250, 252, 0.98), rgba(239, 246, 255, 0.92));
  grid-template-rows: max-content minmax(0, 1fr);
}

.brand-copy {
  display: grid;
  gap: 4px;
  min-width: 0;
}

.brand-copy h1 {
  color: #0f172a !important;
  font-size: 24px !important;
  letter-spacing: 0.08em;
  line-height: 1;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.38);
}

.brand-tagline-grid {
  color: rgba(15, 23, 42, 0.82) !important;
  display: grid;
  font-size: 11px;
  gap: 2px;
  grid-template-columns: 1fr;
  line-height: 1.14;
  max-width: 360px;
}

.brand-tagline-grid span {
  display: block;
  white-space: normal;
}

.brand-tagline-grid span:first-child {
  font-family: 'Poppins', 'Inter', Arial, Helvetica, sans-serif;
  font-weight: 800;
}

.brand-tagline-grid span:nth-child(2) {
  color: rgba(15, 23, 42, 0.72);
  font-weight: 700;
  letter-spacing: 0.015em;
}

.header-link,
.notification-bell {
  align-items: center;
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(100, 116, 139, 0.26);
  border-radius: 999px;
  box-shadow: 0 9px 20px rgba(15, 23, 42, 0.11);
  color: #0f172a;
  display: inline-flex;
  font-weight: 800;
  gap: 6px;
  min-height: 44px;
  padding: 0 15px;
  text-decoration: none;
  white-space: nowrap;
}

.header-link:hover,
.notification-bell:hover {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14), 0 12px 26px rgba(15, 23, 42, 0.14);
  transform: translateY(-1px);
}

.header-link.primary-login {
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  border-color: #2563eb;
  color: #ffffff;
}

.notification-bell {
  min-width: 44px;
  padding: 0 12px;
  position: relative;
}

.notification-badge {
  align-items: center;
  background: #dc2626;
  border: 2px solid #ffffff;
  border-radius: 999px;
  color: #ffffff;
  display: inline-flex;
  font-size: 11px;
  font-weight: 900;
  height: 20px;
  justify-content: center;
  min-width: 20px;
  padding: 0 5px;
}

.public-shell .sidebar,
.portal-shell .sidebar {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.84)),
    radial-gradient(circle at top left, rgba(250, 204, 21, 0.12), transparent 36%);
  align-content: start;
  display: grid;
  gap: 12px;
  overflow-y: auto;
  scrollbar-gutter: stable;
}

.calendar-panel.is-loading::after {
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid rgba(148, 163, 184, 0.28);
  border-radius: 999px;
  box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
  color: var(--aup-navy);
  content: attr(data-loading-label);
  font-size: 13px;
  font-weight: 700;
  left: 50%;
  padding: 8px 13px;
  pointer-events: none;
  position: absolute;
  top: 18px;
  transform: translateX(-50%);
  z-index: 8;
}

.public-shell .announcement-preview {
  min-height: 0;
}

.portal-shell .announcement-preview {
  min-height: 220px;
}

.portal-shell .org-announcement-preview {
  display: none;
  order: -7;
}

body.portal-shell.is-manager .org-announcement-preview {
  display: block;
}

body.portal-shell.is-super-admin .org-announcement-preview,
body.portal-shell.is-public .org-announcement-preview {
  display: none;
}

.public-shell .announcement-preview #announcementPreview,
.portal-shell .announcement-preview #announcementPreview {
  display: grid;
  gap: 10px;
}

.status-card,
.public-login-card,
.participating-card,
.public-shell .announcement-preview,
.portal-shell .announcement-preview {
  background: linear-gradient(180deg, rgba(255, 251, 235, 0.96), rgba(255, 255, 255, 0.9));
  border: 2px solid rgba(217, 119, 6, 0.48);
  border-radius: 16px;
  box-shadow: 0 16px 34px rgba(120, 53, 15, 0.16);
  overflow: visible;
  padding: 14px;
  position: relative;
}

.status-card::before,
.public-login-card::before,
.participating-card::before {
  display: none !important;
}

.public-shell .announcement-preview::before,
.portal-shell .announcement-preview::before {
  animation: announcementGlow 2.8s ease-in-out infinite;
  background: linear-gradient(90deg, #b91c1c, #f59e0b, #2563eb);
  content: '';
  height: 6px;
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
}

.public-shell .announcement-preview .notice,
.portal-shell .announcement-preview .notice {
  background: rgba(255, 255, 255, 0.76);
  border: 1px solid rgba(217, 119, 6, 0.2);
  border-radius: 10px;
  border-left: 0 !important;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
  padding: 10px !important;
}

.public-shell .announcement-preview .notice strong,
.portal-shell .announcement-preview .notice strong {
  color: #7f1d1d;
  font-size: 15px;
  letter-spacing: 0;
}

.public-shell .announcement-preview .notice p {
  margin-bottom: 0;
}

@keyframes announcementGlow {
  0%,
  100% {
    opacity: 0.78;
  }

  50% {
    opacity: 1;
  }
}

.status-card strong,
.public-login-card strong,
.participating-card strong {
  color: #0f172a;
  display: block;
  font-family: 'Poppins', 'Inter', Arial, Helvetica, sans-serif;
  font-size: 15px;
  margin-bottom: 5px;
}

.status-value {
  align-items: center;
  background: rgba(4, 120, 87, 0.1);
  border: 1px solid rgba(4, 120, 87, 0.18);
  border-radius: 999px;
  color: #047857;
  display: inline-flex;
  font-weight: 900;
  gap: 7px;
  margin-top: 8px;
  padding: 6px 10px;
}

.status-value::before {
  background: currentColor;
  border-radius: 999px;
  content: '';
  height: 9px;
  width: 9px;
}

.public-login-actions {
  display: grid;
  gap: 9px;
  margin-top: 10px;
}

.public-login-actions .header-link {
  justify-content: center;
  width: 100%;
}

.public-actions-row {
  display: flex;
  gap: 10px;
}

  overflow-y: auto;

  height: 5px;
  left: 0;
  position: absolute;
  right: 0;
  top: 0;
}

}

.public-shell .activity-item,
.public-shell .public-day-event {
  line-height: 1.22;
}

.portal-shell .admin-action-panel .create-button,
.portal-shell .admin-action-panel .secondary-button,
.portal-shell .sidebar-tab,
.portal-shell .sidebar-section > .secondary-button,
.portal-shell .sidebar-section > .text-button {
  min-height: 42px;
  padding-block: 8px;
}

.portal-shell .modal-actions,
.public-shell .modal-actions {
  align-items: center;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.portal-shell .modal-actions button,
.public-shell .modal-actions button {
  flex: 0 0 auto;
  max-width: 100%;
  min-width: max-content;
  white-space: normal;
  width: auto;
}

.portal-shell .modal-actions.split-actions {
  justify-content: space-between;
}

.portal-shell .modal-actions.split-actions > div {
  align-items: center;
  display: flex;
  flex: 0 1 auto;
  flex-wrap: wrap;
  gap: 8px;
  min-width: 0;
}

.portal-shell .notification-bell {
  aspect-ratio: 1;
  font-size: 19px;
  justify-content: center;
  overflow: visible;
  padding: 0;
  position: relative;
}

.portal-shell .notification-badge {
  font-size: 10px;
  height: 18px;
  min-width: 18px;
  padding: 0 4px;
  position: absolute;
  right: -3px;
  top: -4px;
  z-index: 2;
}

@media (max-width: 900px), (hover: none) and (pointer: coarse) {
  .portal-shell .brand-copy h1,
  .public-shell .brand-copy h1 {
    font-size: clamp(18px, 5vw, 24px) !important;
  }

  .portal-shell .brand-area p,
  .public-shell .brand-area p {
    font-size: clamp(10px, 2.8vw, 12px);
  }

  .portal-shell .sidebar,
  .public-shell .sidebar {
    width: min(88vw, 330px);
  }

  .portal-shell .sidebar-section,
  .portal-shell .admin-action-panel,
  .portal-shell .admin-tabs-panel,
  .public-shell .sidebar-section {
    padding: clamp(10px, 3vw, 14px);
  }

  .portal-shell .admin-tabs-panel {
    border-radius: 12px;
    gap: 8px;
  }

  .portal-shell .admin-tabs-panel > .section-label {
    border-radius: 9px;
    margin: 0 0 8px;
    min-height: 38px;
    padding: 8px 10px;
  }

  .portal-shell .admin-tabs-panel .sidebar-tabs {
    gap: 8px;
  }

  .portal-shell .sidebar-tab,
  .portal-shell .admin-action-panel .create-button,
  .portal-shell .admin-action-panel .secondary-button,
  .portal-shell .sidebar-section > .secondary-button,
  .portal-shell .sidebar-section > .text-button {
    font-size: clamp(12px, 3.2vw, 14px);
  }

  .portal-shell .activity-item,
  .portal-shell .metric span,
  .portal-shell .modal-card,
  .public-shell .activity-item,
  .public-shell .public-day-event {
    font-size: clamp(12px, 3.2vw, 14px);
  }

  .portal-shell #announcementsModal .modal-header,
  .portal-shell #eventRequestsModal .modal-header,
  .portal-shell #usersModal .modal-header {
    border-radius: 0;
    margin: -18px -18px 14px;
  }

  .portal-shell .admin-tab-page .modal-header {
    grid-template-columns: 1fr;
    margin: 0;
    min-height: 66px;
    padding: 12px 14px;
  }

  .portal-shell .admin-tab-page .portal-tab-back {
    justify-self: start;
    min-height: 40px;
    padding: 0 12px;
  }

  .portal-shell .admin-tab-page .modal-card > :not(.modal-header) {
    padding: 12px;
  }
}

@media (max-width: 520px) {
  .portal-shell .modal-card,
  .public-shell .modal-card {
    border-radius: 14px;
    max-width: calc(100vw - 18px);
    padding: 14px;
  }

  .portal-shell .modal-actions,
  .public-shell .modal-actions {
    align-items: center;
    justify-content: flex-end;
  }

  .portal-shell .modal-actions button,
  .public-shell .modal-actions button {
    min-width: 0;
    width: auto;
  }

  .portal-shell .activity-item button,
  .public-shell .activity-item button {
    margin-top: 6px;
    max-width: 100%;
    white-space: normal;
  }

  .portal-shell #announcementsModal .modal-header,
  .portal-shell #eventRequestsModal .modal-header,
  .portal-shell #usersModal .modal-header {
    margin: -14px -14px 12px;
    min-height: 54px;
    padding: 12px 12px 10px;
  }

  .portal-shell .admin-tab-page .modal-header {
    margin: 0;
    min-height: 60px;
    padding: 10px 12px;
  }

  .portal-shell #announcementsModal .modal-header h3,
  .portal-shell #eventRequestsModal .modal-header h3,
  .portal-shell #usersModal .modal-header h3 {
    font-size: 20px;
  }

  .portal-shell .admin-tab-page .modal-header h3 {
    font-size: 20px;
  }
}

  </style>

(() => {
  const fullName = 'CSC S.Y.N.C. — Systemized Year-round Network Calendar';
  const compactName = ['CSC S.Y.N.C.', 'Systemized Year-round Network Calendar'];

  function applyConnectBranding() {
    document.title = document.title?.startsWith('CSC S.Y.N.C.') ? document.title : fullName;

    const metaDescription = document.querySelector('meta[name="description"]');
    if (metaDescription) metaDescription.setAttribute('content', fullName);

    const brandTitle = document.querySelector('.brand-area h1');
    if (brandTitle) brandTitle.textContent = 'CSC S.Y.N.C.';

    const brandSubtitle = document.querySelector('.brand-area p');
    if (!brandSubtitle) return;

    if (brandSubtitle.classList.contains('brand-tagline-grid')) {
      brandSubtitle.innerHTML = `<span>${compactName[0]}</span><span>${compactName[1]}</span>`;
      return;
    }

    brandSubtitle.textContent = fullName;
  }

  applyConnectBranding();
  document.addEventListener('DOMContentLoaded', applyConnectBranding);
})();

(() => {
  function normalizeCalendarEventColors() {
    document.querySelectorAll('.fc-event').forEach((eventElement) => {
      if (eventElement.classList.contains('event-super-admin-block') || eventElement.classList.contains('event-blocked')) return;
      if (eventElement.classList.contains('event-week-span-multi')) return;

      const organizationColor = eventElement.style.backgroundColor || eventElement.style.borderColor;
      if (!organizationColor) return;

      eventElement.style.setProperty('background', organizationColor, 'important');
      eventElement.style.setProperty('background-color', organizationColor, 'important');
      eventElement.style.setProperty('border-color', organizationColor, 'important');
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    normalizeCalendarEventColors();
    const calendar = document.getElementById('calendar');
    if (!calendar) return;

    const observer = new MutationObserver(normalizeCalendarEventColors);
    observer.observe(calendar, { childList: true, subtree: true, attributes: true, attributeFilter: ['class', 'style'] });
  });
})();
